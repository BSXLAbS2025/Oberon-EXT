name: Oberon-EXT v2.33 Multi-Arch

on: [push, pull_request]

jobs:
  native-builds:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Чтобы падение одного не отменяло остальные!
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            setup: sudo apt-get update && sudo apt-get install -y libncurses5-dev libncursesw5-dev
          
          - target: linux-i386
            os: ubuntu-latest
            setup: |
              sudo dpkg --add-architecture i386
              sudo apt-get update
              sudo apt-get install -y gcc-multilib libncurses5-dev:i386
            cmake_flags: "-DCMAKE_C_FLAGS=-m32"

          - target: macos-universal
            os: macos-latest
            # Одинарные кавычки снаружи + двойной слэш
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=arm64"

          - target: win64
            os: windows-latest
            setup: vcpkg install pdcurses:x64-windows
            # Используем переменную окружения в стиле GitHub Actions
            cmake_flags: "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
            # Если не сработает выше, попробуем самый надежный путь для GitHub Runners:
            cmake_flags_win: "-DCMAKE_TOOLCHAIN_FILE=C:/smoketest/vcpkg/scripts/buildsystems/vcpkg.cmake"

    steps:
    - uses: actions/checkout@v4

    - name: Setup Dependencies
      if: matrix.setup
      run: ${{ matrix.setup }}

    - name: Configure CMake
      run: cmake -B build ${{ matrix.cmake_flags }} -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Prepare Artifacts
      shell: bash
      run: |
        mkdir -p dist
        if [ -f "build/Release/oberon-ext.exe" ]; then
          cp build/Release/oberon-ext.exe dist/
        elif [ -f "build/oberon-ext" ]; then
          cp build/oberon-ext dist/
        fi

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Oberon-v2.33-${{ matrix.target }}
        path: dist/

  arm64-build:
    name: Build linux-arm64 (QEMU)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build on ARM64
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: ubuntu22.04
        githubToken: ${{ github.token }}
        install: |
          apt-get update
          apt-get install -y build-essential cmake libncurses5-dev libncursesw5-dev
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          mkdir -p dist
          cp build/oberon-ext dist/
    - name: Upload ARM64
      uses: actions/upload-artifact@v4
      with:
        name: Oberon-v2.33-linux-arm64
        path: dist/
