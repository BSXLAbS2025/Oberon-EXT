name: Oberon-EXT Multi-Arch Build

on: [push, pull_request]

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: x64
          - os: macos-latest
            arch: arm64

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libncurses5-dev libncursesw5-dev gcc-aarch64-linux-gnu

      - name: Build Oberon-EXT (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          gcc -I./include src/*.c src/modules/*.c -o oberon-ext -lncurses -lpthread

      - name: Build Oberon-EXT (Windows)
        if: runner.os == 'Windows'
        run: |
          # Здесь используем vcpkg или скачиваем pdcurses
          gcc -I./include src/*.c src/modules/*.c -o oberon-ext.exe -lws2_32 -lpdcurses

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: oberon-ext-${{ runner.os }}-${{ matrix.arch }}
          path: oberon-ext*
